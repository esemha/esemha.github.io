<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>SMH</title>
	</head>
	<style>
		body {
	  		font-family: 'Helvetica', 'Arial', 'sans-serif'; 
			color: black;
			font-size: 11pt;		
		}

		a, a:link, a:visited, a:active {
			color: blue;
			text-decoration: underline;
		}

		a:hover {
			cursor:pointer;
			color: red;
		}

		.dropzone {
			border: 10px dashed gray;
			width: 20%;
			padding: 2% 2% 5% 2%;
			text-align: center;
			margin: 5px 0 5px 0;
		}

		.divTable{
			display: table;
		}
		

		.greenspan {
			color: green;	  
		}

		.redspan {
			color: red;	  
		}
	</style>	
	<body>
		<div class="container" id=divDecryptfile>
			<div class="divTable">
				<div class="divTableBody">
					<div class="divTableRow">
						<div class="divTableCell"><input id=txtDecpassphrase type=password size=30 value=''></div>
					</div>
				</div>
			</div>
			<div class="divTable">
				<div class="divTableBody">
					<div class="divTableRow">
						<div class="divTableCell"><button id=btnDecrypt onclick=javascript:decryptfile(); >Decrypt File</button></div>
						<div class="divTableCell"><span id=spnDecstatus></span></div>
					</div>
				</div>
			</div>
			<div>
				<a id=aDecsavefile hidden><button>Save Decrypted File</button></a>
			</div>
			<!-- Element to display decrypted text -->
			<div id="decryptedTextOutput" style="white-space: pre-wrap; font-family: monospace; border: 1px solid #ccc; padding: 10px;"></div>
			<!-- Status message -->
			<span id="spnDecstatus"></span>
			<!-- Hide this link (or remove if not needed anymore) -->
			<a id="aDecsavefile" hidden></a>
		</div>
		<script type="text/javascript" src="./code.js" ></script>
	</body>
</html>
